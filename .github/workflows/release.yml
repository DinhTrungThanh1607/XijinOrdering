name: Release Build

# Triggers when you push a tag like v1.0.0, v1.2.3, etc.
# Example:
#   git tag v1.0.0
#   git push origin v1.0.0
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: food-order-app

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Produces a single runnable "fat jar" (all dependencies bundled in),
      # e.g. target/xijinordering-1.0.0.jar
      - name: Build runnable jar
        run: mvn -B clean package -DskipTests

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: food-order-app/target/xijinordering-*.jar
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
